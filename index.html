<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HighSpin with LUMIA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #111827 100%);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.25);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #22d3ee;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 3px;
    }

    #featureBox {
      max-width: 1200px;
      width: calc(100% - 40px);
      margin: 16px auto 10px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(15,23,42,0.92), rgba(2,6,23,0.96));
      border: 1px solid #1e293b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      flex-shrink: 0;
    }

    .feature-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 0;
    }

    .feature-header h2 {
      margin: 0;
      font-size: 18px;
      color: #67e8f9;
    }

    .feature-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feature-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: #22d3ee;
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
    }

    .feature-btn:hover {
      background: #06b6d4;
    }

    .ghost-btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
    }

    .ghost-btn:hover {
      background: #273449;
      color: white;
    }

    #featureContent.hidden {
      display: none;
    }

    #featureContent {
      margin-top: 14px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .feature-card {
      padding: 18px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
    }

    .feature-card h3 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #4ade80;
    }

    .feature-card.disabled h3 {
      color: #f87171;
    }

    .feature-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .feature-card li {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .feature-note {
      margin-top: 18px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }

    #chat {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      padding: 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.18);
    }

    .ai {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.08);
    }

    .system {
      align-self: center;
      background: #111827;
      border: 1px dashed #334155;
      color: #94a3b8;
      font-size: 13px;
    }

    #input-area {
      border-top: 1px solid #1f2937;
      padding: 14px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(15, 23, 42, 0.98);
      flex-shrink: 0;
    }

    .utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode-select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #111827;
      color: white;
      outline: none;
      min-width: 180px;
    }

    #clearBtn {
      padding: 10px 14px;
      white-space: nowrap;
    }
    
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    #question {
      flex: 1;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #111827;
      color: white;
      outline: none;
      min-width: 0;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #22d3ee;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #06b6d4;
      transform: translateY(-1px);
    }

    #fileInput {
      display: none;
    }

    #plusBtn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      padding: 0;
      font-size: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      flex-shrink: 0;
    }

    #plusBtn:hover {
      background: #273449;
      color: white;
    }

    #ask {
      flex-shrink: 0;
    }

    .file-name {
      font-size: 12px;
      color: #94a3b8;
      padding-left: 4px;
    }

    @media (max-width: 768px) {
      header {
        padding: 12px 14px;
      }

      .title {
        font-size: 17px;
      }

      .subtitle {
        font-size: 11px;
      }

      #featureBox {
        width: calc(100% - 16px);
        margin: 8px auto 6px;
        padding: 12px;
      }

      .feature-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .feature-header h2 {
        font-size: 16px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .feature-btn {
        padding: 7px 12px;
        font-size: 14px;
      }

      #chat {
        padding: 12px;
      }

      .message {
        max-width: 88%;
        font-size: 14px;
      }

      .utility-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        flex-wrap: nowrap;
      }

      .mode-select {
        flex: 1;
        min-width: 0;
        height: 40px;
        padding: 8px 10px;
        font-size: 14px;
      }

      #clearBtn {
        height: 40px;
        padding: 8px 12px;
        font-size: 14px;
        flex-shrink: 0;
      }

      .input-row {
        gap: 8px;
      }

      #question {
        font-size: 16px;
      }

      #ask {
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <img src="/icon.png" alt="HighSpin with LUMIA icon" />
      <div>
        <div class="title">HighSpin with LUMIA.v1</div>
        <div class="subtitle">Strategic AI Partner · model: gpt-4.1-mini</div>
      </div>
    </div>
  </header>

 <div id="featureBox">
  <div class="feature-header">
    <h2>HighSpin with LUMIA.v1 현재 기능</h2>

    <div class="feature-actions">
      <button id="toggleFeatureBtn" class="feature-btn">기능 보기</button>
    </div>
  </div>

  <div id="featureContent" class="hidden">
    <div class="feature-grid">
      <div class="feature-card">
        <h3>가능</h3>
        <ul>
          <li>텍스트 질문 답변</li>
          <li>대화 기억</li>
          <li>모드 전환</li>
          <li>업로드된 텍스트 기반 질문</li>
        </ul>
      </div>

      <div class="feature-card disabled">
        <h3>아직 불가</h3>
        <ul>
          <li>이미지 생성</li>
          <li>웹 검색</li>
          <li>이메일 발송</li>
          <li>진짜 파일 변환</li>
          <li>DB 기반 사용자 계정 조회</li>
          <li>PDF / 워드 / 엑셀 완전 지원</li>
          <li>링크 공유형 협업 서비스</li>
        </ul>
      </div>
    </div>

    <p class="feature-note">
      ※ 기능은 지속적으로 업데이트됩니다.
    </p>
  </div>
</div>

  <div id="chat"></div>

  <div id="input-area">
    <div class="utility-row">
      <select id="modeSelect" class="mode-select">
        <option value="assistant">Personal Assistant</option>
        <option value="strategy">Business Strategy</option>
      </select>

      <button id="clearBtn" class="ghost-btn">대화 초기화</button>
    </div>

    <div class="input-row">
      <input
        type="file"
        id="fileInput"
        accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt"
      />
      <button id="plusBtn" type="button">+</button>
      <input id="question" type="text" placeholder="루미아에게 질문하세요..." />
      <button id="ask">Send</button>
    </div>

    <div id="fileName" class="file-name"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
